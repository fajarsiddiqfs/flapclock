<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #e4e4e9;
    --text-primary: #1a1a1a;
    --text-secondary: #999;
    --sh-dark: #b4b4ba;
    --sh-light: #ffffff;
  }
  body.dark {
    --bg: #1c1c22;
    --text-primary: #efefef;
    --text-secondary: #666;
    --sh-dark: #0e0e12;
    --sh-light: #2a2a33;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    transition: background .4s;
  }
  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    width: 100%;
    height: 100%;
  }
  .clock-wrap {
    width: min(52vw, 52vh);
    height: min(52vw, 52vh);
    flex-shrink: 0;
  }
  #clockCanvas { width: 100%; height: 100%; display: block; }
  .time-block { text-align: center; line-height: 1; }
  .time-display { display: flex; align-items: flex-start; justify-content: center; gap: 6px; }
  .time-num {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -3px;
    line-height: 1;
    font-size: clamp(52px, 8.5vw, 108px);
    transition: color .4s;
  }
  .time-ampm {
    font-size: clamp(11px, 1.3vw, 15px);
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: clamp(8px, 1.3vw, 15px);
    font-family: 'DM Mono', monospace;
    letter-spacing: .08em;
    transition: color .4s;
  }
  .date-display {
    font-size: clamp(12px, 1.2vw, 15px);
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 10px;
    letter-spacing: .05em;
    transition: color .4s;
  }
  .icon-btn {
    position: fixed;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--bg);
    box-shadow: 5px 5px 10px var(--sh-dark), -5px -5px 10px var(--sh-light);
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color .3s, background .4s, box-shadow .4s;
    z-index: 10;
  }
  .icon-btn:hover { color: var(--text-primary); }
  #themeBtn { top: 24px; right: 28px; }
  #fsBtn    { bottom: 24px; right: 28px; }
</style>
</head>
<body>

<button class="icon-btn" id="themeBtn" aria-label="Toggle dark mode">
  <i class="ti ti-moon" id="themeIcon" aria-hidden="true"></i>
</button>

<div class="page">
  <div class="clock-wrap">
    <canvas id="clockCanvas"></canvas>
  </div>
  <div class="time-block">
    <div class="time-display">
      <span class="time-num" id="timeNum">12:00</span>
      <span class="time-ampm" id="ampm">AM</span>
    </div>
    <div class="date-display" id="dateDisplay"></div>
  </div>
</div>

<button class="icon-btn" id="fsBtn" aria-label="Toggle fullscreen">
  <i class="ti ti-arrows-maximize" id="fsIcon" aria-hidden="true"></i>
</button>

<script>
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');
let isDark = false;

function pal() {
  return isDark ? {
    bg:         '#1c1c22',
    outer:      '#1e1e26',
    face:       '#18181f',
    shDark:     '#0b0b0f',
    shLight:    '#2e2e38',
    tickMinor:  '#38383f',
    tickMajor:  '#565660',
    hand:       '#d8d8d8',
    handSec:    '#999',
    dot:        '#e0e0e0',
    dotHole:    '#18181f',
  } : {
    bg:         '#e4e4e9',
    outer:      '#eaeaef',
    face:       '#dcdce2',
    shDark:     '#b4b4ba',
    shLight:    '#ffffff',
    tickMinor:  '#c4c4ca',
    tickMajor:  '#999',
    hand:       '#1a1a1a',
    handSec:    '#555',
    dot:        '#1a1a1a',
    dotHole:    '#dcdce2',
  };
}

/* Draw a circle with neumorphic raised shadow using a radial gradient overlay
   instead of double-pass shadow (which bleeds on one side). */
function neuCircle(x, y, r, fill, shDark, shLight, blur, offset) {
  // 1. Draw clipped outer shadow (dark — bottom-right)
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.shadowColor   = shDark;
  ctx.shadowBlur    = blur;
  ctx.shadowOffsetX = offset;
  ctx.shadowOffsetY = offset;
  ctx.fillStyle     = fill;
  ctx.fill();
  ctx.restore();

  // 2. Top-left light shadow on separate layer clipped to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.clip();
  ctx.shadowColor   = shLight;
  ctx.shadowBlur    = blur;
  ctx.shadowOffsetX = -offset * 3;
  ctx.shadowOffsetY = -offset * 3;
  // draw a disc slightly outside clip so only its shadow bleeds in
  ctx.beginPath();
  ctx.arc(x - offset * 3, y - offset * 3, r * 1.3, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.restore();

  // 3. Re-fill the circle cleanly so the interior is solid
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.restore();
}

/* Inset (pressed) circle using inner shadows via clipped shadow trick */
function insetCircle(x, y, r, fill, shDark, shLight, blur, offset) {
  // fill base
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.restore();

  // inset dark shadow (bottom-right inside edge)
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.clip();
  ctx.shadowColor   = shDark;
  ctx.shadowBlur    = blur;
  ctx.shadowOffsetX = offset;
  ctx.shadowOffsetY = offset;
  ctx.beginPath();
  ctx.arc(x + offset, y + offset, r * 1.25, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.restore();

  // inset light highlight (top-left inside edge)
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.clip();
  ctx.shadowColor   = shLight;
  ctx.shadowBlur    = blur;
  ctx.shadowOffsetX = -offset;
  ctx.shadowOffsetY = -offset;
  ctx.beginPath();
  ctx.arc(x - offset, y - offset, r * 1.25, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.restore();

  // re-fill centre so no artefacts from overdrawn expanded discs
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r * 0.88, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.shadowColor = 'transparent';
  ctx.fill();
  ctx.restore();
}

function drawClock() {
  const dpr  = window.devicePixelRatio || 1;
  const size = canvas.width / dpr;
  const cx = size / 2, cy = size / 2;
  const R  = size / 2;
  const p  = pal();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const outerR = R * 0.96;
  const faceR  = R * 0.76;
  const blur   = R * 0.10;
  const offset = R * 0.055;

  // Outer raised disc
  neuCircle(cx, cy, outerR, p.outer, p.shDark, p.shLight, blur, offset);

  // Inset face
  insetCircle(cx, cy, faceR, p.face, p.shDark, p.shLight, R * 0.08, R * 0.04);

  // Tick marks
  ctx.save();
  ctx.shadowColor = 'transparent';
  for (let i = 0; i < 60; i++) {
    const isMajor = i % 5 === 0;
    const angle   = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const r1 = faceR * 0.96;
    const r2 = isMajor ? faceR * 0.82 : faceR * 0.90;
    ctx.beginPath();
    ctx.moveTo(cx + r1 * Math.cos(angle), cy + r1 * Math.sin(angle));
    ctx.lineTo(cx + r2 * Math.cos(angle), cy + r2 * Math.sin(angle));
    ctx.strokeStyle = isMajor ? p.tickMajor : p.tickMinor;
    ctx.lineWidth   = isMajor ? R * 0.022 : R * 0.011;
    ctx.lineCap     = 'round';
    ctx.stroke();
  }
  ctx.restore();

  // Time calc
  const now  = new Date();
  const ms   = now.getMilliseconds();
  const secs = now.getSeconds() + ms / 1000;
  const mins = now.getMinutes() + secs / 60;
  const hrs  = (now.getHours() % 12) + mins / 60;

  const hAngle = (hrs  / 12) * Math.PI * 2 - Math.PI / 2;
  const mAngle = (mins / 60) * Math.PI * 2 - Math.PI / 2;
  const sAngle = (secs / 60) * Math.PI * 2 - Math.PI / 2;

  function hand(angle, len, width, color) {
    ctx.save();
    ctx.shadowColor   = isDark ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.15)';
    ctx.shadowBlur    = R * 0.05;
    ctx.shadowOffsetX = R * 0.02;
    ctx.shadowOffsetY = R * 0.02;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + len * Math.cos(angle), cy + len * Math.sin(angle));
    ctx.strokeStyle = color;
    ctx.lineWidth   = width;
    ctx.lineCap     = 'round';
    ctx.stroke();
    ctx.restore();
  }

  hand(hAngle, faceR * 0.50, R * 0.048, p.hand);
  hand(mAngle, faceR * 0.70, R * 0.032, p.hand);

  // Second hand with tail
  ctx.save();
  ctx.shadowColor   = isDark ? 'rgba(0,0,0,0.5)' : 'rgba(0,0,0,0.10)';
  ctx.shadowBlur    = R * 0.04;
  ctx.shadowOffsetX = R * 0.015;
  ctx.shadowOffsetY = R * 0.015;
  ctx.beginPath();
  ctx.moveTo(cx - faceR * 0.18 * Math.cos(sAngle), cy - faceR * 0.18 * Math.sin(sAngle));
  ctx.lineTo(cx + faceR * 0.72 * Math.cos(sAngle), cy + faceR * 0.72 * Math.sin(sAngle));
  ctx.strokeStyle = p.handSec;
  ctx.lineWidth   = R * 0.018;
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.restore();

  // Center dot ring
  ctx.save();
  ctx.shadowColor = 'transparent';
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.058, 0, Math.PI * 2);
  ctx.fillStyle = p.dotHole;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.036, 0, Math.PI * 2);
  ctx.fillStyle = p.dot;
  ctx.fill();
  ctx.restore();
}

function updateDigital() {
  const now  = new Date();
  const h    = now.getHours(), m = now.getMinutes();
  const h12  = h % 12 || 12;
  document.getElementById('timeNum').textContent =
    h12.toString().padStart(2,'0') + ':' + m.toString().padStart(2,'0');
  document.getElementById('ampm').textContent = h < 12 ? 'AM' : 'PM';
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateDisplay').textContent =
    days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}

function resize() {
  const wrap = document.querySelector('.clock-wrap');
  const s    = wrap.offsetWidth;
  const dpr  = window.devicePixelRatio || 1;
  canvas.width  = s * dpr;
  canvas.height = s * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function frame() {
  resize();
  drawClock();
  updateDigital();
  requestAnimationFrame(frame);
}

document.getElementById('themeBtn').addEventListener('click', () => {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('themeIcon').className = isDark ? 'ti ti-sun' : 'ti ti-moon';
});

document.getElementById('fsBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById('fsIcon').className = 'ti ti-arrows-minimize';
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement)
    document.getElementById('fsIcon').className = 'ti ti-arrows-maximize';
});

requestAnimationFrame(frame);
</script>
</body>
</html>
